const getZona = (bairro) => {
  if (ZONA_SUL.includes(bairro))   return { label:'Zona Sul',   emoji:'⭐', css:'bg-emerald-100 text-emerald-700' };
  if (ZONA_NORTE.includes(bairro)) return { label:'Zona Norte',  emoji:'🔵', css:'bg-blue-100 text-blue-700' };
  if (ZONA_OESTE.includes(bairro)) return { label:'Zona Oeste',  emoji:'🟠', css:'bg-orange-100 text-orange-700' };
  return null;
};

const IMOVEIS = IMOVEIS_RAW.filter(im => BAIRROS_PESQUISA.includes(im.bairro));

// ── HELPERS ────────────────────────────────────────────────────────────────
const fmtBRL = v => v.toLocaleString('pt-BR', { style:'currency', currency:'BRL' });

const diasRestantes = (data) => {
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const enc = new Date(data + 'T00:00:00');
  return Math.ceil((enc - hoje) / 86400000);
};

const countdownColor = (dias) => {
  if (dias <= 3) return 'text-red-600 bg-red-50 border-red-200';
  if (dias <= 7) return 'text-orange-600 bg-orange-50 border-orange-200';
  return 'text-green-600 bg-green-50 border-green-200';
};

const desconto = (v2, v1) => Math.round((1 - v2/v1)*100);

// ── TOAST ──────────────────────────────────────────────────────────────────
function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 4000); return () => clearTimeout(t); }, []);
  const colors = type === 'success' ? 'bg-green-600' : type === 'error' ? 'bg-red-600' : 'bg-blue-600';
  return (
    <div className={`toast fade-in flex items-center gap-2 text-white px-4 py-3 rounded-lg shadow-xl ${colors} max-w-sm`}>
      <span className="text-sm font-medium">{msg}</span>
      <button onClick={onClose} className="ml-2 opacity-70 hover:opacity-100">{Icon.x}</button>
    </div>
  );
}

// ── CARD ───────────────────────────────────────────────────────────────────
function ImovelCard({ imovel }) {
  const dias = diasRestantes(imovel.dataEncerramento);
  const zona = getZona(imovel.bairro);
  const tem2Leilao = !!imovel.valor1leilao;
  const perc = tem2Leilao ? desconto(imovel.valor, imovel.valor1leilao) : 0;

  return (
    <div className="card-hover bg-white rounded-2xl shadow-md overflow-hidden border border-gray-100 flex flex-col">
      {/* Header */}
      <div className="bg-gradient-to-r from-blue-50 to-indigo-50 p-4 border-b border-gray-100">
        <div className="flex flex-wrap gap-1.5 mb-2">
          <span className="text-xs font-semibold px-2 py-0.5 rounded-full bg-blue-100 text-blue-700">{imovel.tipo}</span>
          <span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${imovel.tipoLeilao === 'Judicial' ? 'bg-purple-100 text-purple-700' : 'bg-amber-100 text-amber-700'}`}>{imovel.tipoLeilao}</span>
          {tem2Leilao && <span className="text-xs font-bold px-2 py-0.5 rounded-full bg-red-100 text-red-700">2º Leilão</span>}
          {zona && <span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${zona.css}`}>{zona.emoji} {zona.label}</span>}
        </div>
        <p className="text-sm font-semibold text-gray-800 line-clamp-2">{imovel.endereco === 'Consulte o link' ? '📍 Endereço via link' : imovel.endereco}</p>
        <p className="text-xs text-blue-600 font-medium mt-1">{imovel.bairro}</p>
      </div>

      {/* Body */}
      <div className="p-4 flex flex-col flex-1 gap-3">
        {/* Countdown */}
        <div className={`flex items-center gap-2 text-xs font-semibold px-3 py-1.5 rounded-lg border ${countdownColor(dias)}`}>
          {dias <= 3 ? Icon.alert : Icon.clock}
          <span>{dias > 0 ? `${dias} dias restantes` : 'Encerrado'}</span>
          <span className="ml-auto font-normal opacity-80">{new Date(imovel.dataEncerramento + 'T00:00:00').toLocaleDateString('pt-BR')}</span>
        </div>

        {/* Valor */}
        <div>
          {tem2Leilao && (
            <div className="flex items-center gap-2">
              <p className="line-through-value text-sm text-gray-400">{fmtBRL(imovel.valor1leilao)}</p>
              <span className="text-xs font-bold text-green-600 bg-green-50 px-1.5 py-0.5 rounded">-{perc}%</span>
            </div>
          )}
          <p className="text-2xl font-bold text-blue-700">{fmtBRL(imovel.valor)}</p>
        </div>

        {/* Detalhes */}
        <div className="grid grid-cols-4 gap-1">
          {[
            { icon: Icon.bed, val: imovel.quartos, label: 'qtos' },
            { icon: Icon.bath, val: imovel.banheiros, label: 'banh' },
            { icon: Icon.car, val: imovel.vagas, label: 'vagas' },
            { icon: Icon.area, val: imovel.area, label: 'm²' },
          ].map((d, i) => (
            <div key={i} className="flex flex-col items-center bg-gray-50 rounded-lg p-1.5 text-gray-600">
              {d.icon}
              <span className="text-xs font-bold mt-0.5">{d.val}</span>
              <span className="text-xs opacity-60">{d.label}</span>
            </div>
          ))}
        </div>

        {/* Características */}
        <p className="text-xs text-gray-600 bg-gray-50 rounded-lg p-2.5 leading-relaxed line-clamp-3">{imovel.caracteristicas}</p>

        {/* Botão */}
        <a href={imovel.link} target="_blank" rel="noopener noreferrer"
          className="mt-auto flex items-center justify-center gap-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white text-sm font-semibold py-2.5 px-4 rounded-xl transition-all">
          Ver Leilão {Icon.external}
        </a>
      </div>
    </div>
  );
}

        </div>
      </div>
    </div>
  );
}

// ── MAPA PLACEHOLDER ───────────────────────────────────────────────────────
function MapaSection({ imoveis }) {
  const [apiKey, setApiKey] = useState('');
  const [inputKey, setInputKey] = useState('');
  const mapRef = useRef(null);
  const mapLoaded = useRef(false);

  const carregarMapa = useCallback(() => {
    if (!apiKey || mapLoaded.current) return;
    mapLoaded.current = true;
    const script = document.createElement('script');
    script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&libraries=marker&v=beta&callback=initMap`;
    script.async = true;
    window.initMap = () => {
      const map = new window.google.maps.Map(mapRef.current, {
        center: { lat: -22.9068, lng: -43.1729 },
        zoom: 12,
        mapId: 'leilao-map',
      });
      imoveis.filter(im => !im.endereco.includes('Consulte')).forEach(im => {
        const geocoder = new window.google.maps.Geocoder();
        geocoder.geocode({ address: im.endereco + ', Rio de Janeiro, RJ, Brasil' }, (res, status) => {
          if (status !== 'OK') return;
          const pos = res[0].geometry.location;
          const marker = new window.google.maps.marker.AdvancedMarkerElement({ position: pos, map, title: im.bairro });
          const info = new window.google.maps.InfoWindow({
            content: `<div style="font-family:Inter,sans-serif;max-width:200px"><b>${im.endereco}</b><br/><span style="color:#2563eb;font-size:1.1em">${fmtBRL(im.valor)}</span><br/>${im.quartos} qtos · ${im.banheiros} banh · ${im.area}m²</div>`
          });
          marker.addListener('click', () => info.open({ anchor: marker, map }));
        });
      });
    };
    document.head.appendChild(script);
  }, [apiKey, imoveis]);

  useEffect(() => { if (apiKey) carregarMapa(); }, [apiKey, carregarMapa]);

  if (!apiKey) return (
    <div className="max-w-7xl mx-auto px-4 mb-8">
      <div className="bg-white rounded-2xl shadow-md p-6 border border-gray-100">
        <div className="flex items-center gap-2 mb-4">
          {Icon.map}
          <h2 className="text-lg font-bold text-gray-800">Mapa Interativo</h2>
        </div>
        <div className="bg-gradient-to-br from-blue-50 to-indigo-50 rounded-xl p-8 text-center border-2 border-dashed border-blue-200">
          <div className="text-4xl mb-3">🗺️</div>
          <p className="text-gray-700 font-medium mb-1">Insira sua Google Maps API Key para ativar o mapa</p>
          <p className="text-gray-500 text-sm mb-4">Acesse <a href="https://console.cloud.google.com" target="_blank" className="text-blue-600 underline">console.cloud.google.com</a> e habilite Maps JavaScript API + Geocoding API</p>
          <div className="flex gap-2 max-w-md mx-auto">
            <input className="flex-1 text-sm border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
              placeholder="AIzaSy..." value={inputKey} onChange={e => setInputKey(e.target.value)} />
            <button onClick={() => setApiKey(inputKey)} disabled={!inputKey}
              className="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-4 py-2 rounded-lg disabled:opacity-50">
              Carregar
            </button>
          </div>
        </div>
      </div>
    </div>
  );

  return (
    <div className="max-w-7xl mx-auto px-4 mb-8">
      <div className="bg-white rounded-2xl shadow-md overflow-hidden border border-gray-100">
        <div className="flex items-center gap-2 p-4 border-b">
          {Icon.map}
          <h2 className="text-lg font-bold text-gray-800">Mapa Interativo</h2>
        </div>
        <div ref={mapRef} style={{ height: 400 }} className="w-full bg-gray-100 flex items-center justify-center">
          <div className="flex items-center gap-2 text-gray-400">{Icon.spin} Carregando mapa...</div>
        </div>
      </div>
    </div>
  );
}

// ── DOWNLOAD EXCEL ─────────────────────────────────────────────────────────
function downloadExcel(imoveis) {
  const wb = XLSX.utils.book_new();
  const data = [
    ['ID','Endereço','Bairro','Tipo','Tipo Leilão','Valor (R$)','1º Leilão (R$)','Quartos','Banheiros','Vagas','Área (m²)','Enc.','Link'],
    ...imoveis.map(im => [
      im.id, im.endereco, im.bairro, im.tipo, im.tipoLeilao,
      im.valor, im.valor1leilao || '', im.quartos, im.banheiros,
      im.vagas, im.area, im.dataEncerramento, im.link
    ])
  ];
  const ws = XLSX.utils.aoa_to_sheet(data);

  // Larguras
  ws['!cols'] = [5,40,18,14,16,18,18,8,10,7,9,12,45].map(w => ({ wch: w }));

  // Estilo cabeçalho (linha 1)
  const range = XLSX.utils.decode_range(ws['!ref']);
  for (let c = range.s.c; c <= range.e.c; c++) {
    const addr = XLSX.utils.encode_cell({ r: 0, c });
    if (!ws[addr]) continue;
    ws[addr].s = { font: { bold: true, color: { rgb: 'FFFFFF' } }, fill: { fgColor: { rgb: '1D4ED8' } }, alignment: { horizontal: 'center' } };
  }

  XLSX.utils.book_append_sheet(wb, ws, 'Leilões RJ');

  // Aba Zona Sul
  const zonaSul = imoveis.filter(im => ZONA_SUL.includes(im.bairro)).sort((a,b) => b.valor - a.valor);
  if (zonaSul.length) {
    const ws2 = XLSX.utils.aoa_to_sheet([
      ['Bairro','Endereço','Tipo','Tipo Leilão','Valor (R$)','Enc.'],
      ...zonaSul.map(im => [im.bairro, im.endereco, im.tipo, im.tipoLeilao, im.valor, im.dataEncerramento])
    ]);
    ws2['!cols'] = [18,40,14,16,18,12].map(w => ({ wch: w }));
    XLSX.utils.book_append_sheet(wb, ws2, 'Zona Sul');
  }

  const date = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `leilao-imoveis-rio-${date}.xlsx`);
}

            )}
            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
              {ordenados.map(im => <ImovelCard key={im.id} imovel={im} />)}
            </div>
          </>
        )}
      </main>

      {/* FOOTER */}
      <footer className="bg-gray-900 text-gray-300">
        <div className="max-w-7xl mx-auto px-4 py-10 grid grid-cols-1 md:grid-cols-3 gap-8">
          <div>
            <h3 className="text-white font-bold mb-2 flex items-center gap-2">{Icon.home} Sobre</h3>
            <p className="text-sm text-gray-400 leading-relaxed">Portal de monitoramento de leilões de imóveis no Rio de Janeiro. Atualizado regularmente com oportunidades judiciais e extrajudiciais.</p>
          </div>
          <div>
            <h3 className="text-white font-bold mb-2">Fontes</h3>
            <ul className="text-sm text-gray-400 space-y-1">
              <li>• Leilões Judiciais (TJ-RJ)</li>
              <li>• Caixas Econômicas</li>
              <li>• Leiloeiros Credenciados</li>
              <li>• Bancos e Financeiras</li>
            </ul>
          </div>
          <div>
            <h3 className="text-white font-bold mb-2">Informações</h3>
            <ul className="text-sm text-gray-400 space-y-1">
              <li>• Verifique sempre o edital completo</li>
              <li>• Consulte um advogado antes de arrematar</li>
              <li>• Valores sujeitos a alteração</li>
              <li>• Site meramente informativo</li>
            </ul>
          </div>
        </div>
        <div className="border-t border-gray-800 py-4 text-center text-xs text-gray-500">
          © {new Date().getFullYear()} Leilão de Imóveis RJ — Dados meramente informativos
        </div>
      </footer>

      {/* TOAST */}
      {toast && <Toast key={toast.id} msg={toast.msg} type={toast.type} onClose={() => setToast(null)} />}

      {/* MODAL EMAILJS */}
      {showEmailConfig && (
        <EmailConfigModal
          config={{ publicKey:'', serviceId:'', templateId:'', ...emailConfig }}
          onClose={() => setShowEmailConfig(false)}
          onSave={salvarConfig}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
